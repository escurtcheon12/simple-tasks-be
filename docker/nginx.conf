user www-data;
worker_processes auto;
pid /run/nginx/nginx.pid;

events {
    worker_connections 768;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80 default_server;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        charset utf-8;

        # Standard Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Health check
        location /health {
            access_log off;
            add_header 'Content-Type' 'text/plain';
            return 200 "OK";
        }

        location / {
            # Logika CORS di sini sudah dihapus karena ditangani oleh Laravel (cors.php)
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        error_page 404 /index.php;

        location ~ \.php$ {
            # Logika CORS di sini juga sudah dihapus agar tidak duplikat dengan Laravel

            # Add security headers (Wajib diulang karena add_header di level location menghapus pewarisan)
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header X-Content-Type-Options "nosniff" always;

            # FastCGI configuration
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            
            # Header penting untuk Auth dan performa
            fastcgi_pass_header Authorization;
            fastcgi_read_timeout 300;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}